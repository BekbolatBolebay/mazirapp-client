events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name pb.mazirapp.kz logs.mazirapp.kz;
        return 301 https://$host$request_uri;
    }

    # PocketBase Backend (pb.mazirapp.kz)
    server {
        listen 443 ssl default_server;
        server_name pb.mazirapp.kz;

        ssl_certificate /etc/letsencrypt/live/mazirapp.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mazirapp.kz/privkey.pem;

        # PocketBase Admin UI
        location /_ / {
            proxy_pass http://pocketbase:8090/_ /;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # PocketBase APIs
        location /api/ {
            proxy_pass http://pocketbase:8090/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://pocketbase:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Logs Viewer (logs.mazirapp.kz)
    server {
        listen 443 ssl;
        server_name logs.mazirapp.kz;

        ssl_certificate /etc/letsencrypt/live/mazirapp.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mazirapp.kz/privkey.pem;

        location / {
            auth_basic "Mazir Logs Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://dozzle:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
