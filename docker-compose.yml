# Integrated Docker Compose for Mazir App & PocketBase
# Persistence: All data is stored in ./volumes/

services:
  # --- Next.js Applications ---
  client:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        - APP_DIR=food-app-build
    environment:
      - NEXT_PUBLIC_POCKETBASE_URL=${POCKETBASE_URL}
    restart: always
    networks:
      - internal
    depends_on:
      - pocketbase

  admin-app:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        - APP_DIR=admin
    environment:
      - NEXT_PUBLIC_POCKETBASE_URL=${POCKETBASE_URL}
    restart: always
    networks:
      - internal
    depends_on:
      - pocketbase

  # --- PocketBase Backend ---
  pocketbase:
    image: muchobien/pocketbase:latest
    restart: always
    ports:
      - "8090:8090"
    volumes:
      - ./volumes/pocketbase/data:/pb_data
      - ./volumes/pocketbase/public:/pb_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

networks:
  internal:
    driver: bridge
