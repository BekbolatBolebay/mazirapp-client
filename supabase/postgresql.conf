# Optimized Postgres Configuration for 32GB RAM
# ---------------------------------------------

# Connectivity
max_connections = 100

# Memory Settings
shared_buffers = 8GB
effective_cache_size = 24GB
maintenance_work_mem = 2GB
work_mem = 20MB

# Write Ahead Log (WAL)
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# Performance & Optimizer
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Other
huge_pages = off
# Logging (Optional)
log_min_duration_statement = 200 # Log slow queries
