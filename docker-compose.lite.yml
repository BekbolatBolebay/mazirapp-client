# Lightweight PocketBase Vault Configuration
# This version removes heavy Next.js and SQL containers.
# Data is kept in ./volumes/

services:
  # --- PocketBase (Sensitive Data & Auth) ---
  pocketbase:
    image: alpine:latest
    restart: always
    environment:
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
    volumes:
      - ./volumes/pocketbase/data:/pb_data
    command: 
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl unzip
        if [ ! -f /usr/local/bin/pocketbase ]; then
          curl -L https://github.com/pocketbase/pocketbase/releases/download/v0.22.20/pocketbase_0.22.20_linux_amd64.zip -o pocketbase.zip
          unzip pocketbase.zip
          chmod +x pocketbase
          mv pocketbase /usr/local/bin/
          rm pocketbase.zip
        fi
        /usr/local/bin/pocketbase serve --http=0.0.0.0:8090 --dir=/pb_data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal

  # --- Dozzle Log Viewer ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_BASE=/logs
    networks:
      - internal
    restart: always

networks:
  internal:
    driver: bridge
