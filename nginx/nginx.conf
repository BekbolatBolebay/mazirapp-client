events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # HTTP to HTTPS Redirection
    server {
        listen 80;
        server_name mazirapp.kz www.mazirapp.kz secure-cafes-idishere.mazirapp.kz;
        return 301 https://$host$request_uri;
    }

    # Main Application (mazirapp.kz)
    server {
        listen 443 ssl;
        server_name mazirapp.kz www.mazirapp.kz;

        ssl_certificate /etc/letsencrypt/live/mazirapp.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mazirapp.kz/privkey.pem;

        location / {
            proxy_pass http://client:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin Panel (SECURE SUBDOMAIN)
    server {
        listen 443 ssl;
        server_name secure-cafes-idishere.mazirapp.kz;

        ssl_certificate /etc/letsencrypt/live/mazirapp.kz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mazirapp.kz/privkey.pem;

        location / {
            proxy_pass http://admin-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
